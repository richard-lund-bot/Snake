<style>
  :root{
    --lcd:#a8ba84;        /* LCD background  */
    --lcd-2:#9bae74;      /* LCD darker tint */
    --ink:#1f2a14;        /* LCD "pixels"    */
    --body-0:#262b31;
    --body-1:#12151a;
    --key-0:#2d333c;
    --key-1:#161a20;
    --cap:#e7ecd6;        /* key glyph color */
    --brand:#c4cbd3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; -webkit-text-size-adjust:100%;}
  html{background:#0a0c0e;}
  body{
    position:fixed; inset:0; overflow:hidden;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
    color:var(--brand);
    background:radial-gradient(130% 120% at 50% 0%, #1a1e24 0%, #0a0c0e 70%);
    overscroll-behavior:none; touch-action:none;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  #app{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:calc(env(safe-area-inset-top) + 8px) calc(env(safe-area-inset-right) + 8px)
            calc(env(safe-area-inset-bottom) + 8px) calc(env(safe-area-inset-left) + 8px);
  }
  /* ---- the "phone" ---- */
  #device{
    width:100%; max-width:430px; height:100%; max-height:860px;
    display:flex; flex-direction:column; gap:10px;
    padding:16px 16px 20px;
    background:linear-gradient(165deg,var(--body-0),var(--body-1));
    border-radius:30px;
    box-shadow:0 18px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.07),
               inset 0 -2px 6px rgba(0,0,0,.5);
  }
  #brand{
    flex:0 0 auto; text-align:center; letter-spacing:5px; font-weight:700;
    font-size:14px; color:var(--brand); text-shadow:0 1px 0 rgba(0,0,0,.6);
    padding-top:2px;
  }
  #brand small{display:block; letter-spacing:3px; font-size:9px; opacity:.5; font-weight:600;}
  /* ---- LCD screen ---- */
  #screen{
    position:relative; flex:1 1 auto; min-height:0;
    display:flex; align-items:center; justify-content:center;
    padding:10px;
    background:linear-gradient(180deg,var(--lcd),var(--lcd-2));
    border-radius:10px;
    box-shadow:inset 0 0 0 2px #11140d, inset 0 2px 10px rgba(0,0,0,.35),
               0 1px 0 rgba(255,255,255,.05);
  }
  /* faint LCD scanlines */
  #screen::after{
    content:""; position:absolute; inset:10px; border-radius:4px; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply; opacity:.5;
  }
  canvas#game{display:block; image-rendering:pixelated; image-rendering:crisp-edges;}
  /* ---- LCD panels (start / pause / over / high-scores / initials entry) ---- */
  .panel{
    position:absolute; inset:10px; border-radius:4px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:18px;
    color:var(--ink); background:var(--lcd);
    text-transform:uppercase; letter-spacing:2px;
  }
  .panel.hidden{display:none;}
  .panel h1{font-size:26px; font-weight:800; margin:0; line-height:1.1;}
  #ovText{font-size:12px; line-height:1.6; margin:0; max-width:240px;}
  #ovText b{font-weight:800;}
  .lcd-hint{font-size:12px; font-weight:800; letter-spacing:3px; animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .lcd-btn{
    appearance:none; -webkit-appearance:none; cursor:pointer;
    font-family:inherit; text-transform:uppercase; letter-spacing:3px; font-weight:800;
    font-size:15px; padding:10px 26px; color:var(--lcd); background:var(--ink);
    border:2px solid var(--ink); border-radius:4px;
  }
  .lcd-btn:active{background:transparent; color:var(--ink);}
  .lcd-btn.ghost{background:transparent; color:var(--ink); font-size:12px; padding:7px 16px; letter-spacing:2px;}
  .lcd-btn.ghost:active{background:var(--ink); color:var(--lcd);}
  /* initials entry */
  #entryRank{font-size:12px; font-weight:800; letter-spacing:2px; margin:0;}
  #entryForm{display:flex; flex-direction:column; align-items:center; gap:18px;}
  #initials{
    font-family:inherit; text-align:center; text-transform:uppercase; font-weight:800;
    font-size:30px; letter-spacing:10px; width:6ch; padding:2px 0 6px 10px;
    color:var(--ink); background:transparent; border:none; border-bottom:3px solid var(--ink);
    outline:none; caret-color:var(--ink);
  }
  #initials::placeholder{color:rgba(31,42,20,.35);}
  /* high-score table */
  #scoreList{
    list-style:none; margin:0; padding:0 4px; width:100%; max-width:250px;
    max-height:52vh; overflow:auto; font-size:13px; letter-spacing:1px;
  }
  #scoreList li{display:flex; align-items:baseline; gap:8px; padding:3px 6px; border-radius:3px;}
  #scoreList li.you{background:var(--ink); color:var(--lcd);}
  #scoreList .rank{width:2.2ch; text-align:right; opacity:.65;}
  #scoreList .nm{flex:1; text-align:left; padding-left:8px; letter-spacing:3px;}
  #scoreList .sc{font-weight:800;}
  #scoreList .empty{justify-content:center; opacity:.6;}
  /* game menu list */
  #gameList{
    list-style:none; margin:0; padding:0 4px; width:100%; max-width:250px;
    max-height:52vh; overflow:auto; font-size:14px; letter-spacing:2px;
  }
  #gameList li{display:flex; align-items:baseline; gap:8px; padding:8px 10px; border-radius:3px; cursor:pointer;}
  #gameList li.sel{background:var(--ink); color:var(--lcd);}
  #gameList .nm{flex:1; text-align:left;}
  #gameList .sc{font-weight:800; font-size:11px; opacity:.8;}
  /* ---- on-screen pause button (floats over the LCD, not part of the D-pad) ---- */
  #pauseBtn{
    position:absolute; bottom:6px; right:6px; z-index:6;
    display:none; align-items:center; justify-content:center; gap:4px;
    width:30px; height:30px; padding:0;
    background:rgba(31,42,20,.10); border:1.5px solid rgba(31,42,20,.55);
    border-radius:7px; cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  #pauseBtn.show{display:flex;}
  #pauseBtn i{width:5px; height:15px; background:var(--ink); border-radius:1px;}
  #pauseBtn:active{background:var(--ink);}
  #pauseBtn:active i{background:var(--lcd);}
  /* hit area extends past the artwork — miss above/below and still "hit" */
  #pauseBtn::after{content:""; position:absolute; inset:-16px -14px;}

  /* ---- D-pad (SNES-style: dark cross on a lighter, fully-tappable plate) ---- */
  #pad{
    position:relative; flex:0 0 auto; align-self:center;
    width:min(64vw,220px,38vh); aspect-ratio:1/1; border-radius:26%;
    background:linear-gradient(157deg,#e2e5ea,#c0c5cc);
    box-shadow:inset 0 2px 3px rgba(255,255,255,.75),
               inset 0 -7px 16px rgba(0,0,0,.28),
               0 6px 14px rgba(0,0,0,.5);
  }
  /* the lighter plate is split into four triangular hit zones meeting in the
     middle — tapping anywhere on the plate counts, which shrinks mis-taps */
  .zone{
    position:absolute; inset:0; margin:0; padding:0; border:0;
    background:transparent; cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  #z-up   {clip-path:polygon(0 0,100% 0,50% 50%);}
  #z-right{clip-path:polygon(100% 0,100% 100%,50% 50%);}
  #z-down {clip-path:polygon(100% 100%,0 100%,50% 50%);}
  #z-left {clip-path:polygon(0 100%,0 0,50% 50%);}
  /* the dark cross is purely visual and never intercepts taps */
  .cross{position:absolute; inset:0; pointer-events:none;}
  .cross .arm{
    position:absolute; background:linear-gradient(180deg,#474d56,#23272e);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.10), inset 0 -3px 6px rgba(0,0,0,.5),
               0 2px 4px rgba(0,0,0,.45);
  }
  .arm.up   {top:8%;  bottom:50%; left:34%; right:34%; border-radius:11px 11px 4px 4px;}
  .arm.down {top:50%; bottom:8%;  left:34%; right:34%; border-radius:4px 4px 11px 11px;}
  .arm.left {left:8%; right:50%;  top:34%;  bottom:34%; border-radius:11px 4px 4px 11px;}
  .arm.right{left:50%; right:8%;  top:34%;  bottom:34%; border-radius:4px 11px 11px 4px;}
  .cross .hub{
    position:absolute; inset:34%; border-radius:20%;
    background:linear-gradient(180deg,#3f454e,#262b31);
    box-shadow:inset 0 1px 2px rgba(255,255,255,.08);
  }
  /* concave dimple on each arm */
  .arm::after{
    content:""; position:absolute; left:50%; top:50%; width:36%; height:36%;
    transform:translate(-50%,-50%); border-radius:50%;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.06);
  }
  /* pressing a zone lights up the matching arm */
  #z-up:active    ~ .cross .arm.up,
  #z-down:active  ~ .cross .arm.down,
  #z-left:active  ~ .cross .arm.left,
  #z-right:active ~ .cross .arm.right{filter:brightness(1.4);}
  /* outward direction ticks on the light rim */
  .tick{position:absolute; width:0; height:0; pointer-events:none; opacity:.5;}
  .tick.up   {top:3.5%;    left:50%; transform:translateX(-50%); border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:9px solid #5b616a;}
  .tick.down {bottom:3.5%; left:50%; transform:translateX(-50%); border-left:7px solid transparent; border-right:7px solid transparent; border-top:9px solid #5b616a;}
  .tick.left {left:3.5%;   top:50%;  transform:translateY(-50%); border-top:7px solid transparent; border-bottom:7px solid transparent; border-right:9px solid #5b616a;}
  .tick.right{right:3.5%;  top:50%;  transform:translateY(-50%); border-top:7px solid transparent; border-bottom:7px solid transparent; border-left:9px solid #5b616a;}
  #hint{flex:0 0 auto; text-align:center; font-size:10px; letter-spacing:2px; color:#5b636e;}
  @media (max-height:620px){ #brand small{display:none;} #hint{display:none;} }
  @media (max-height:540px){ #brand{display:none;} }
</style>
</head>
<body>
  <div id="app">
    <div id="device">
      <div id="brand">NOKIA<small id="brandSub">ARCADE</small></div>
      <div id="screen">
        <canvas id="game"></canvas>
        <button id="pauseBtn" type="button" aria-label="Pause"><i></i><i></i></button>
        <div id="overlay" class="panel">
          <h1 id="ovTitle">SNAKE</h1>
          <p id="ovText">Eat the dots. Don't hit the walls or yourself.</p>
          <button id="playBtn" class="lcd-btn">Start</button>
          <button id="scoresBtn" class="lcd-btn ghost">High Scores</button>
          <button id="menuBtn" class="lcd-btn ghost">Menu</button>
          <div id="ovHint" class="lcd-hint">PRESS START</div>
        </div>
        <div id="entry" class="panel hidden">
          <h1>New High Score!</h1>
          <p id="entryRank">You made the top 10</p>
          <form id="entryForm" autocomplete="off">
            <input id="initials" type="text" maxlength="3" inputmode="text"
                   autocapitalize="characters" autocomplete="off" spellcheck="false"
                   aria-label="Enter your initials" placeholder="AAA">
            <button id="entrySave" class="lcd-btn" type="submit">Save</button>
          </form>
        </div>
        <div id="scores" class="panel hidden">
          <h1>High Scores</h1>
          <ol id="scoreList"></ol>
          <button id="scoresBack" class="lcd-btn">Back</button>
        </div>
        <div id="menu" class="panel">
          <h1>ARCADE</h1>
          <ol id="gameList"></ol>
          <div id="menuHint" class="lcd-hint">TAP A GAME</div>
        </div>
      </div>
      <div id="pad">
        <button class="zone" id="z-up"    aria-label="Up"></button>
        <button class="zone" id="z-right" aria-label="Right"></button>
        <button class="zone" id="z-down"  aria-label="Down"></button>
        <button class="zone" id="z-left"  aria-label="Left"></button>
        <div class="cross" aria-hidden="true">
          <span class="arm up"></span>
          <span class="arm right"></span>
          <span class="arm down"></span>
          <span class="arm left"></span>
          <span class="hub"></span>
        </div>
        <span class="tick up"    aria-hidden="true"></span>
        <span class="tick right" aria-hidden="true"></span>
        <span class="tick down"  aria-hidden="true"></span>
        <span class="tick left"  aria-hidden="true"></span>
      </div>
      <div id="hint">D-PAD OR ARROWS · ❚❚ PAUSES</div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ===== console constants =====
  var STATUS_ROWS = 1.7, MAX_SCORES = 10;
  var LCD_BG = '#a8ba84', INK = '#1f2a14';

  // ===== DOM =====
  var canvas = document.getElementById('game'),
      ctx = canvas.getContext('2d'),
      screenEl = document.getElementById('screen'),
      brandSub = document.getElementById('brandSub'),
      overlay = document.getElementById('overlay'),
      ovTitle = document.getElementById('ovTitle'),
      ovText = document.getElementById('ovText'),
      ovHint = document.getElementById('ovHint'),
      playBtn = document.getElementById('playBtn'),
      pauseBtn = document.getElementById('pauseBtn'),
      scoresBtn = document.getElementById('scoresBtn'),
      menuBtn = document.getElementById('menuBtn'),
      entryPanel = document.getElementById('entry'),
      entryRank = document.getElementById('entryRank'),
      entryForm = document.getElementById('entryForm'),
      initials = document.getElementById('initials'),
      scoresPanel = document.getElementById('scores'),
      scoreList = document.getElementById('scoreList'),
      scoresBack = document.getElementById('scoresBack'),
      menuPanel = document.getElementById('menu'),
      gameList = document.getElementById('gameList');

  // ===== console state =====
  var cell = 16, statusH = 24, fieldX = 0, fieldY = 0, GRID = 16,
      state = 'menu', screenKind = 'menu', lastStep = 0, won = false,
      current = null, score = 0, best = 0, scores = [], hsKey = '',
      menuSel = 0;

  // ===== high-score store (per game, top 10, newest-wins on ties) =====
  function loadScores(key){
    try {
      var raw = JSON.parse(localStorage.getItem(key) || '[]');
      if (Object.prototype.toString.call(raw) === '[object Array]')
        return raw.filter(function(e){ return e && typeof e.score === 'number'; })
                  .sort(function(a, b){ return b.score - a.score; }).slice(0, MAX_SCORES);
    } catch(e){}
    return [];
  }
  function saveScores(key, arr){ try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e){} }
  function bestFor(id){ var s = loadScores('hs:' + id); return s.length ? s[0].score : 0; }
  function qualifies(s){ return s > 0 && (scores.length < MAX_SCORES || s > scores[scores.length - 1].score); }
  function rankFor(s){ var r = 1; for (var i = 0; i < scores.length; i++) if (scores[i].score > s) r++; return r; }
  // one-time migration of the original Snake scores into the keyed store
  function migrateSnake(){
    try {
      if (localStorage.getItem('hs:snake') != null) return;
      var old = localStorage.getItem('snakeScores');
      if (old != null) { localStorage.setItem('hs:snake', old); return; }
      var b = parseInt(localStorage.getItem('snakeBest') || '0', 10) || 0;
      if (b > 0) localStorage.setItem('hs:snake', JSON.stringify([{ name: 'YOU', score: b }]));
    } catch(e){}
  }

  // ===== 5x7 pixel font for the LCD read-outs =====
  var FONT = {
    '0':[0x0E,0x11,0x13,0x15,0x19,0x11,0x0E],'1':[0x04,0x0C,0x04,0x04,0x04,0x04,0x0E],
    '2':[0x0E,0x11,0x01,0x02,0x04,0x08,0x1F],'3':[0x1F,0x02,0x04,0x02,0x01,0x11,0x0E],
    '4':[0x02,0x06,0x0A,0x12,0x1F,0x02,0x02],'5':[0x1F,0x10,0x1E,0x01,0x01,0x11,0x0E],
    '6':[0x06,0x08,0x10,0x1E,0x11,0x11,0x0E],'7':[0x1F,0x01,0x02,0x04,0x08,0x08,0x08],
    '8':[0x0E,0x11,0x11,0x0E,0x11,0x11,0x0E],'9':[0x0E,0x11,0x11,0x0F,0x01,0x02,0x0C],
    'H':[0x11,0x11,0x11,0x1F,0x11,0x11,0x11],'I':[0x0E,0x04,0x04,0x04,0x04,0x04,0x0E]
  };
  function px(n){ return Math.round(n); }
  function glyph(g, x, y, s){
    if (!g) return;
    for (var r = 0; r < 7; r++) for (var c = 0; c < 5; c++)
      if (g[r] & (1 << (4 - c))) ctx.fillRect(px(x + c * s), px(y + r * s), s, s);
  }
  function text(str, x, y, s, alignRight){
    var w = str.length * 6 * s - s;
    if (alignRight) x -= w;
    for (var i = 0; i < str.length; i++){ glyph(FONT[str[i]], x, y, s); x += 6 * s; }
    return w;
  }

  // ===== draw API handed to games (coords are grid cells in the play field) =====
  function fillCell(gx, gy){ ctx.fillRect(px(fieldX + gx * cell), px(fieldY + gy * cell), cell - 1, cell - 1); }
  function punchCenter(gx, gy){
    var sx = fieldX + gx * cell, sy = fieldY + gy * cell;
    ctx.fillStyle = LCD_BG;
    ctx.fillRect(px(sx + (cell - 1) / 2 - 1), px(sy + (cell - 1) / 2 - 1), 2, 2);
    ctx.fillStyle = INK;
  }
  var api = {
    GRID: GRID, cell: cell, fieldX: fieldX, fieldY: fieldY, statusH: statusH,
    block: fillCell,                                    // solid cell (snake body)
    head: function(gx, gy){ fillCell(gx, gy); if (cell >= 9) punchCenter(gx, gy); }, // solid + hole
    dot: function(gx, gy){ var i = cell <= 8 ? 1 : 2; ctx.fillRect(px(fieldX + gx * cell + i), px(fieldY + gy * cell + i), cell - i * 2, cell - i * 2); },
    ring: function(gx, gy){                              // hollow square (frozen foe)
      var x = px(fieldX + gx * cell), y = px(fieldY + gy * cell), w = cell - 1;
      ctx.fillRect(x, y, w, 1); ctx.fillRect(x, y + w - 1, w, 1);
      ctx.fillRect(x, y, 1, w); ctx.fillRect(x + w - 1, y, 1, w);
    },
    beam: function(gx, gy){ ctx.fillRect(px(fieldX + gx * cell + (cell >> 1) - 1), px(fieldY + gy * cell + (cell >> 1) - 1), 2, 2); },
    fillPx: function(x, y, w, h){ ctx.fillRect(px(x), px(y), Math.max(1, Math.round(w)), Math.max(1, Math.round(h))); },  // raw canvas-pixel rect (effects)
    text: text, glyph: glyph,
    setScore: function(n){ score = n; if (score > best) best = score; },
    addScore: function(d){ api.setScore(score + (d || 1)); },
    getScore: function(){ return score; },
    gameOver: function(){ endGame(false); },
    win: function(){ endGame(true); },
    sinceStep: function(){ return performance.now() - lastStep; },
    stepNow: function(){ lastStep = performance.now(); current.tick(api); }
  };

  // ===== sizing =====
  function resize(){
    var pad = 10, rect = screenEl.getBoundingClientRect();
    var availW = rect.width - pad * 2, availH = rect.height - pad * 2;
    cell = Math.max(6, Math.floor(Math.min(availW / GRID, availH / (GRID + STATUS_ROWS))));
    statusH = Math.round(cell * STATUS_ROWS);
    var cssW = cell * GRID, cssH = cell * GRID + statusH;
    fieldX = 0; fieldY = statusH;
    var dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
    canvas.width = Math.round(cssW * dpr); canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    api.cell = cell; api.fieldX = fieldX; api.fieldY = fieldY; api.statusH = statusH; api.GRID = GRID;
    draw();
  }

  // ===== core render: LCD wash + status bar, then the active game's field =====
  function draw(ts){
    ts = ts || performance.now();
    var W = cell * GRID, H = cell * GRID + statusH;
    ctx.fillStyle = LCD_BG; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = INK;
    if (!current) return;                              // menu: the panel covers the canvas
    var fs = Math.max(1, Math.floor(statusH / 9));
    var fy = Math.round((statusH - 7 * fs) / 2);
    text(String(score), 2 * fs, fy, fs, false);
    text('HI' + String(best), W - 2 * fs, fy, fs, true);
    ctx.fillRect(0, statusH - 1, W, 1);                 // status divider
    ctx.fillRect(fieldX, fieldY, W, 1);                 // field border
    ctx.fillRect(fieldX, H - 1, W, 1);
    ctx.fillRect(fieldX, fieldY, 1, H - fieldY);
    ctx.fillRect(W - 1, fieldY, 1, H - fieldY);
    current.draw(api, ts);
  }

  // ===== loop =====
  function loop(ts){
    requestAnimationFrame(loop);
    if (state === 'playing'){
      if (!lastStep) lastStep = ts;
      var ms = current.stepMs ? current.stepMs(api) : 130;
      if (ts - lastStep >= ms){ lastStep = ts; current.tick(api, ts); }
    }
    draw(ts);
  }

  // ===== panels / flow =====
  function hidePanels(){
    overlay.classList.add('hidden'); entryPanel.classList.add('hidden');
    scoresPanel.classList.add('hidden'); menuPanel.classList.add('hidden');
  }
  function showOverlay(title, html, btn, hint, opts){
    opts = opts || {};
    hidePanels();
    ovTitle.textContent = title; ovText.innerHTML = html;
    playBtn.textContent = btn; ovHint.textContent = hint || '';
    ovHint.style.display = hint ? '' : 'none';
    scoresBtn.style.display = opts.scores ? '' : 'none';
    menuBtn.style.display = opts.menu ? '' : 'none';
    overlay.classList.remove('hidden');
    pauseBtn.classList.remove('show');
  }

  // ----- home menu -----
  function showMenu(){
    current = null; state = 'menu'; screenKind = 'menu';
    brandSub.textContent = 'ARCADE';
    hidePanels(); renderMenu(); menuPanel.classList.remove('hidden');
    pauseBtn.classList.remove('show');
  }
  function renderMenu(){
    var html = '';
    for (var i = 0; i < GAMES.length; i++){
      var g = GAMES[i], hb = bestFor(g.id);
      html += '<li data-i="' + i + '"' + (i === menuSel ? ' class="sel"' : '') +
              '><span class="nm">' + g.title + '</span><span class="sc">' +
              (hb ? 'HI ' + hb : '—') + '</span></li>';
    }
    gameList.innerHTML = html;
  }
  function menuNav(dx, dy){
    if (dy){ menuSel = (menuSel + (dy > 0 ? 1 : -1) + GAMES.length) % GAMES.length; renderMenu(); }
    else if (dx > 0) launchSel();
  }
  function launchSel(){ startGame(GAMES[menuSel]); }

  // ----- game lifecycle -----
  function startGame(g){
    current = g; GRID = g.grid || 16; api.GRID = GRID;
    hsKey = 'hs:' + g.id; scores = loadScores(hsKey);
    best = scores.length ? scores[0].score : 0; score = 0;
    brandSub.textContent = g.title;
    hidePanels();
    g.reset(api);                       // populate state before the first draw
    resize();
    state = 'playing'; lastStep = 0; pauseBtn.classList.add('show');
  }
  function endGame(w){
    won = w; state = 'over'; screenKind = 'end';
    if (qualifies(score)) showEntry(); else showEnd();
  }
  function showEnd(){
    var opts = { scores: true, menu: true };
    if (won) showOverlay('YOU WIN', 'Perfect board &mdash; <b>' + score + '</b>', 'Play Again', 'TAP TO RETRY', opts);
    else showOverlay('GAME OVER', 'Score <b>' + score + '</b> · Best <b>' + best + '</b>', 'Play Again', 'TAP TO RETRY', opts);
  }
  function togglePause(){
    if (state === 'playing'){ state = 'paused'; showOverlay('PAUSED', 'Take a breather.', 'Resume', 'TAP TO RESUME', { scores: false, menu: true }); }
    else if (state === 'paused'){ state = 'playing'; lastStep = 0; hidePanels(); pauseBtn.classList.add('show'); }
  }

  // ----- initials entry + score table -----
  function showEntry(){
    hidePanels();
    entryRank.textContent = "You're #" + rankFor(score) + ' · score ' + score;
    initials.value = '';
    entryPanel.classList.remove('hidden');
    pauseBtn.classList.remove('show');
    setTimeout(function(){ try { initials.focus(); } catch(e){} }, 60);
  }
  function saveEntry(){
    var nm = (initials.value || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 3) || 'AAA';
    scores.push({ name: nm, score: score });
    scores.sort(function(a, b){ return b.score - a.score; });
    if (scores.length > MAX_SCORES) scores.length = MAX_SCORES;
    best = scores[0].score;
    saveScores(hsKey, scores);
    showScores(nm, score);
  }
  function showScores(hlName, hlScore){
    hidePanels();
    renderScoreList(hlName, hlScore);
    scoresPanel.classList.remove('hidden');
    pauseBtn.classList.remove('show');
  }
  function renderScoreList(hlName, hlScore){
    if (!scores.length){ scoreList.innerHTML = '<li class="empty">No scores yet</li>'; return; }
    var html = '', hl = (hlName != null);
    for (var i = 0; i < scores.length; i++){
      var e = scores[i], you = hl && e.name === hlName && e.score === hlScore;
      if (you) hl = false;
      html += '<li' + (you ? ' class="you"' : '') + '><span class="rank">' + (i + 1) +
              '</span><span class="nm">' + e.name + '</span><span class="sc">' + e.score + '</span></li>';
    }
    scoreList.innerHTML = html;
  }

  // tap the empty area of the main overlay = start / resume / retry
  function activate(){
    if (state === 'paused'){ togglePause(); return; }
    if (state === 'over' && !overlay.classList.contains('hidden')){ startGame(current); }
  }

  // ===== input =====
  function press(el, fn){
    el.addEventListener('pointerdown', function(e){ e.preventDefault(); fn(); }, { passive: false });
  }
  overlay.addEventListener('pointerdown', function(e){
    if (e.target.closest('button, input, form, ol, li')) return;
    e.preventDefault();
    if (!overlay.classList.contains('hidden')) activate();
  }, { passive: false });
  press(playBtn, function(){ activate(); });
  press(scoresBtn, function(){ showScores(); });
  press(menuBtn, function(){ showMenu(); });
  press(scoresBack, function(){ if (screenKind === 'end') showEnd(); else showMenu(); });
  entryForm.addEventListener('submit', function(e){ e.preventDefault(); saveEntry(); });
  press(pauseBtn, function(){ if (state === 'playing') togglePause(); });
  gameList.addEventListener('pointerdown', function(e){
    var li = e.target.closest('li'); if (!li) return;
    e.preventDefault();
    var i = parseInt(li.getAttribute('data-i'), 10);
    if (i >= 0){ menuSel = i; launchSel(); }
  }, { passive: false });

  function dpad(id, x, y){
    press(document.getElementById(id), function(){
      if (state === 'playing'){ if (current && current.onDir) current.onDir(x, y, api); }
      else if (state === 'menu') menuNav(x, y);
      else activate();
    });
  }
  dpad('z-up', 0, -1); dpad('z-down', 0, 1); dpad('z-left', -1, 0); dpad('z-right', 1, 0);

  window.addEventListener('keydown', function(e){
    if (e.target && (e.target.tagName === 'INPUT' || e.target.isContentEditable)) return;
    var k = e.key, dx = 0, dy = 0;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') dy = -1;
    else if (k === 'ArrowDown' || k === 's' || k === 'S') dy = 1;
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') dx = -1;
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') dx = 1;
    else if (k === ' ' || k === 'Enter'){
      if (state === 'menu') launchSel();
      else if (state === 'playing' || state === 'paused') togglePause();
      else activate();
      e.preventDefault(); return;
    } else return;
    if (state === 'playing'){ if (current && current.onDir) current.onDir(dx, dy, api); }
    else if (state === 'menu') menuNav(dx, dy);
    else if (state === 'over' && !overlay.classList.contains('hidden')) activate();
    e.preventDefault();
  }, { passive: false });

  // touch never steers — only the D-pad and keyboard do; still block page scroll/zoom
  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });

  // ===== game registry =====
  var GAMES = [];
  function register(g){ GAMES.push(g); }

  // ---- Snake ----
  register((function(){
    var START_LEN = 3, BASE = 130, MINS = 70, STEP = 4, MIN_STEP = 55;
    var snake, dir, queue, food;
    function reset(api){
      var G = api.GRID, c = Math.floor(G / 2);
      snake = [];
      for (var i = 0; i < START_LEN; i++) snake.push({ x: c - i, y: c });
      dir = { x: 1, y: 0 }; queue = [];
      placeFood(api);
    }
    function placeFood(api){
      var G = api.GRID;
      if (snake.length >= G * G) { api.win(); return; }
      var occ = {}, p, k;
      for (var i = 0; i < snake.length; i++) occ[snake[i].x + ',' + snake[i].y] = 1;
      do { p = { x: (Math.random() * G) | 0, y: (Math.random() * G) | 0 }; k = p.x + ',' + p.y; }
      while (occ[k]);
      food = p;
    }
    function onDir(nx, ny, api){
      var ref = queue.length ? queue[queue.length - 1] : dir;
      if (ref.x === -nx && ref.y === -ny) return;       // no reversal
      if (ref.x === nx && ref.y === ny) return;          // no duplicate
      if (queue.length < 2) queue.push({ x: nx, y: ny });
      if (api.sinceStep() >= MIN_STEP) api.stepNow();    // eager turn
    }
    function tick(api){
      var G = api.GRID;
      if (queue.length) dir = queue.shift();
      var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.y < 0 || head.x >= G || head.y >= G) return api.gameOver();
      var ate = (head.x === food.x && head.y === food.y);
      var limit = ate ? snake.length : snake.length - 1;
      for (var i = 0; i < limit; i++) if (snake[i].x === head.x && snake[i].y === head.y) return api.gameOver();
      snake.unshift(head);
      if (ate){ api.addScore(1); placeFood(api); } else snake.pop();
    }
    function draw(api, ts){
      if ((ts % 600) < 420) api.dot(food.x, food.y);     // food blinks
      for (var i = 0; i < snake.length; i++){
        if (i === 0) api.head(snake[0].x, snake[0].y);
        else api.block(snake[i].x, snake[i].y);
      }
    }
    function stepMs(api){ return Math.max(MINS, BASE - api.getScore() * STEP); }
    return { id: 'snake', title: 'SNAKE', grid: 16,
             reset: reset, tick: tick, draw: draw, onDir: onDir, stepMs: stepMs };
  })());

  // ---- Don't Blink: foes freeze while watched; hold your stare and they crumble ----
  register((function(){
    // tuning — a tick is STEP_MS; difficulty eases from "0" to peak over RAMP ticks
    var STEP_MS = 140;               // steady pace (~7 ticks/sec)
    var STARE_NEEDED = 6;            // ticks a foe must stay watched before it crumbles
    var STARE_DECAY = 1;             // stare bled off per tick once you look away
    var ADV0 = 4, ADV_MIN = 3;       // an unwatched foe steps inward every N ticks (eases ADV0 -> ADV_MIN)
    var SPAWN0 = 18, SPAWN_MIN = 5;  // ticks between spawns (eases SPAWN0 -> SPAWN_MIN)
    var RAMP = 800;                  // ticks to reach peak difficulty (~110s in)
    var START_FOES = 2;
    var BURST_MS = 320;              // banish explosion length (real time)
    var aim, foes, t, sinceSpawn, bursts;
    function ctr(api){ var c = Math.floor(api.GRID / 2); return { x: c, y: c }; }
    function ease(a, b){ var k = t / RAMP; return Math.round(a + (b - a) * (k > 1 ? 1 : k)); }
    function reset(api){
      aim = { x: 0, y: -1 }; foes = []; bursts = []; t = 0; sinceSpawn = 0;
      for (var i = 0; i < START_FOES; i++) spawn(api);
    }
    function spawn(api){
      var G = api.GRID, s = (Math.random() * 4) | 0, x, y;
      if (s === 0){ x = (Math.random() * G) | 0; y = 0; }
      else if (s === 1){ x = G - 1; y = (Math.random() * G) | 0; }
      else if (s === 2){ x = (Math.random() * G) | 0; y = G - 1; }
      else { x = 0; y = (Math.random() * G) | 0; }
      foes.push({ x: x, y: y, charge: 0, creep: 0 });
    }
    function aimName(){ return aim.y < 0 ? 'up' : aim.y > 0 ? 'down' : aim.x < 0 ? 'left' : 'right'; }
    function wedge(dx, dy){                              // which gaze-quadrant a foe sits in
      if (dx === 0 && dy === 0) return null;
      if (Math.abs(dx) <= Math.abs(dy)) return dy < 0 ? 'up' : 'down';  // diagonals tie to vertical
      return dx < 0 ? 'left' : 'right';
    }
    function onDir(nx, ny, api){ aim = { x: nx, y: ny }; }
    function tick(api, ts){
      var P = ctr(api), an = aimName(), adv = ease(ADV0, ADV_MIN), i, f, dx, dy;
      t++;
      for (i = foes.length - 1; i >= 0; i--){           // reverse: safe to splice on banish
        f = foes[i]; dx = f.x - P.x; dy = f.y - P.y;
        if (wedge(dx, dy) === an){                       // watched: frozen, and the stare builds
          if (++f.charge >= STARE_NEEDED){               // crumbles -> explosion + score
            bursts.push({ x: f.x, y: f.y, t0: ts || 0 }); foes.splice(i, 1); api.addScore(1);
          }
          continue;
        }
        if (f.charge > 0) f.charge -= STARE_DECAY;        // look away and the stare cools off
        if (++f.creep >= adv){                            // unwatched foes creep inward slowly
          f.creep = 0;
          if (Math.abs(dx) >= Math.abs(dy)) f.x += dx > 0 ? -1 : 1;
          else f.y += dy > 0 ? -1 : 1;
          if (f.x === P.x && f.y === P.y) return api.gameOver();   // a foe reached you
        }
      }
      if (++sinceSpawn >= ease(SPAWN0, SPAWN_MIN)){ sinceSpawn = 0; spawn(api); }
    }
    function draw(api, ts){
      var G = api.GRID, P = ctr(api), i, f, r, cx, cy, bu, age, k, cs, pop, rad, sz, ang;
      for (r = 1; r < G; r++){                            // gaze beam (where you're looking)
        cx = P.x + aim.x * r; cy = P.y + aim.y * r;
        if (cx < 0 || cy < 0 || cx >= G || cy >= G) break;
        api.beam(cx, cy);
      }
      api.head(P.x, P.y);                                 // you
      for (i = 0; i < foes.length; i++){
        f = foes[i];
        if (f.charge >= STARE_NEEDED - 1 && (ts % 240) < 120) continue;  // about to crumble: blink out
        if (f.charge > 0) api.ring(f.x, f.y);             // observed / being stared down
        else api.dot(f.x, f.y);                           // closing in
      }
      cs = api.cell;                                      // banish explosions, drawn on top (real time)
      for (i = bursts.length - 1; i >= 0; i--){
        bu = bursts[i]; age = ts - bu.t0;
        if (!(age >= 0 && age < BURST_MS)){ bursts.splice(i, 1); continue; }
        k = age / BURST_MS;                                // 0..1
        cx = api.fieldX + bu.x * cs + cs / 2; cy = api.fieldY + bu.y * cs + cs / 2;
        pop = cs * 1.5 * (1 - k / 0.4);                    // bright core flash, gone by 40%
        if (pop > 1) api.fillPx(cx - pop / 2, cy - pop / 2, pop, pop);
        rad = cs * (0.15 + 2.1 * k);                       // shrapnel ring blows outward ~2 cells
        sz = Math.max(1, cs * 0.42 * (1 - k));             // ... and the bits shrink to nothing
        for (r = 0; r < 10; r++){
          ang = r * 0.6283 + k;                            // 10 sparks, slight swirl
          api.fillPx(cx + Math.cos(ang) * rad - sz / 2, cy + Math.sin(ang) * rad - sz / 2, sz, sz);
        }
      }
    }
    function stepMs(api){ return STEP_MS; }
    return { id: 'blink', title: "DON'T BLINK", grid: 16,
             reset: reset, tick: tick, draw: draw, onDir: onDir, stepMs: stepMs };
  })());

  // ---- Mirror Twins: one D-pad drives two mirrored dots; feed both fuses before they burn out ----
  register((function(){
    var STEP_MS = 120;               // tick: twins advance one cell along the heading
    var FUSE0 = 120, FUSE_MIN = 22;  // pellet lifespan in ticks (shrinks as you score)
    var SHR = 0.8;                   // fuse shrink per pellet collected
    var LIVES = 3;
    var lx, ly, hx, hy, pL, pR, lives, flash;       // right twin is the reflection of (lx,ly)
    function rint(n){ return (Math.random() * n) | 0; }
    function fuseLen(api){ return Math.max(FUSE_MIN, Math.round(FUSE0 - api.getScore() * SHR)); }
    function spawnL(api){ var h = api.GRID >> 1, p; do { p = { x: rint(h), y: rint(api.GRID) }; } while (p.x === lx && p.y === ly); p.fuse = fuseLen(api); pL = p; }
    function spawnR(api){ var G = api.GRID, h = G >> 1, rx = G - 1 - lx, p; do { p = { x: h + rint(G - h), y: rint(G) }; } while (p.x === rx && p.y === ly); p.fuse = fuseLen(api); pR = p; }
    function reset(api){
      var G = api.GRID, h = G >> 1;
      lx = h >> 1; ly = G >> 1; hx = 0; hy = 0; lives = LIVES; flash = 0;
      spawnL(api); spawnR(api);
      pR.fuse = Math.round(pR.fuse * 0.6);           // stagger so the two don't co-expire
    }
    function onDir(nx, ny, api){ hx = nx; hy = ny; } // set heading; right twin mirrors it
    function clamp(v, lo, hi){ return v < lo ? lo : v > hi ? hi : v; }
    function loseLife(api, ts){ lives--; flash = (ts || 0) + 340; if (lives <= 0) api.gameOver(); }
    function tick(api, ts){
      var G = api.GRID, h = G >> 1, rx, ry;
      lx = clamp(lx + hx, 0, h - 1); ly = clamp(ly + hy, 0, G - 1);   // step along heading
      rx = G - 1 - lx; ry = ly;
      if (lx === pL.x && ly === pL.y){ api.addScore(1); spawnL(api); } // collect
      if (rx === pR.x && ry === pR.y){ api.addScore(1); spawnR(api); }
      pL.fuse--; pR.fuse--;                                            // burn fuses
      if (pL.fuse <= 0){ loseLife(api, ts); if (lives > 0) spawnL(api); }
      if (lives > 0 && pR.fuse <= 0){ loseLife(api, ts); if (lives > 0) spawnR(api); }
    }
    function drawPellet(api, p, ts){
      if (p.fuse > 24){ api.dot(p.x, p.y); return; }  // plenty of fuse: steady dot
      var per = Math.max(120, p.fuse * 22);           // running low: blink, faster as it nears 0
      if ((ts % per) < per * 0.55) api.dot(p.x, p.y);
    }
    function draw(api, ts){
      var G = api.GRID, h = G >> 1, rx = G - 1 - lx, cs = api.cell, i, y;
      var bx = api.fieldX + h * cs;                  // mirror divider (dashed)
      for (y = 0; y < G; y++) if (y % 2 === 0) api.fillPx(bx, api.fieldY + y * cs + cs * 0.3, 1, cs * 0.4);
      drawPellet(api, pL, ts); drawPellet(api, pR, ts);
      if (!((ts < flash) && ((ts % 160) < 80))){ api.head(lx, ly); api.head(rx, ly); }  // twins (blink on hit)
      var W = G * cs, sb = api.statusH, ps = Math.max(2, (sb / 4) | 0), gp = ps + 3;     // life pips
      var x0 = (W - (lives * gp - 3)) / 2, yy = (sb - ps) / 2;
      for (i = 0; i < lives; i++) api.fillPx(x0 + i * gp, yy, ps, ps);
    }
    function stepMs(api){ return STEP_MS; }
    return { id: 'twins', title: 'MIRROR TWINS', grid: 16,
             reset: reset, tick: tick, draw: draw, onDir: onDir, stepMs: stepMs };
  })());

  // ---- Polarity: slide to each wall's gap and match its charge (Up = +, Down = -) ----
  register((function(){
    var STEP0 = 210, STEP_MIN = 110, STEP_DEN = 12;    // fall pace ramps faster over time
    var SPC0 = 8, SPC_MIN = 4, SPC_DEN = 170;          // ticks between walls (shrinks)
    var WAN0 = 2, WAN_MAX = 8, WAN_DEN = 130;          // how far a gap may wander from the last (grows)
    var GAPW = 2, LIVES = 3;
    var px, pol, lives, walls, sinceSpawn, prevGap, t, pendingDx, flash;
    function prow(api){ return api.GRID - 1; }         // player sits on the bottom row
    function rint(n){ return (Math.random() * n) | 0; }
    function spacing(){ return Math.max(SPC_MIN, Math.round(SPC0 - t / SPC_DEN)); }
    function wander(){ return Math.min(WAN_MAX, WAN0 + ((t / WAN_DEN) | 0)); }
    function spawn(api){
      var G = api.GRID, K = wander(), g = prevGap + (rint(2 * K + 1) - K);
      g = g < 0 ? 0 : g > G - GAPW ? G - GAPW : g;
      prevGap = g;
      walls.push({ y: 0, gap: g, pol: rint(2) ? 1 : -1 });
      sinceSpawn = 0;
    }
    function reset(api){
      var G = api.GRID;
      px = G >> 1; pol = 1; lives = LIVES; walls = []; sinceSpawn = 0; prevGap = (G - GAPW) >> 1; t = 0; pendingDx = 0; flash = 0;
      spawn(api);
    }
    function onDir(nx, ny, api){
      if (ny < 0) pol = 1;                             // Up  = positive
      else if (ny > 0) pol = -1;                       // Down = negative
      else if (nx) pendingDx = nx;                     // queue a horizontal step; applied in tick (<=1/tick)
    }
    function tick(api, ts){
      var pr = prow(api), G = api.GRID, i, b;
      t++;
      if (pendingDx){ px = Math.max(0, Math.min(G - 1, px + pendingDx)); pendingDx = 0; }  // apply queued step
      for (i = walls.length - 1; i >= 0; i--){
        b = walls[i]; b.y++;
        if (b.y === pr){                               // reached the player row -> resolve
          var ok = (px >= b.gap && px < b.gap + GAPW) && (pol === b.pol);
          if (ok) api.addScore(1);
          else { lives--; flash = (ts || 0) + 320; walls.splice(i, 1); if (lives <= 0){ api.gameOver(); return; } continue; }
        }
        if (b.y >= pr) walls.splice(i, 1);             // gone past (passed cleanly)
      }
      if (++sinceSpawn >= spacing()) spawn(api);
    }
    function draw(api, ts){
      var pr = prow(api), G = api.GRID, i, b, x;
      for (i = 0; i < walls.length; i++){
        b = walls[i]; if (b.y < 0 || b.y >= pr) continue;
        for (x = 0; x < G; x++){
          if (x >= b.gap && x < b.gap + GAPW){ if (b.pol === 1) api.dot(x, b.y); else api.ring(x, b.y); }  // gap charge marker
          else api.block(x, b.y);                      // wall
        }
      }
      if (!((ts < flash) && ((ts % 140) < 70))){       // you (solid = +, hollow = -)
        if (pol === 1) api.block(px, pr); else api.ring(px, pr);
      }
      var W = G * api.cell, sb = api.statusH, ps = Math.max(2, (sb / 4) | 0), gp = ps + 3;   // life pips
      var x0 = (W - (lives * gp - 3)) / 2, yy = (sb - ps) / 2;
      for (i = 0; i < lives; i++) api.fillPx(x0 + i * gp, yy, ps, ps);
    }
    function stepMs(api){ return Math.max(STEP_MIN, Math.round(STEP0 - t / STEP_DEN)); }
    return { id: 'polarity', title: 'POLARITY', grid: 16,
             reset: reset, tick: tick, draw: draw, onDir: onDir, stepMs: stepMs };
  })());

  // ===== init =====
  migrateSnake();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 150); });
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
  resize();
  showMenu();
  requestAnimationFrame(loop);
})();
</script>
</body>
