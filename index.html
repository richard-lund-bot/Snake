<style>
  :root{
    --lcd:#a8ba84;        /* LCD background  */
    --lcd-2:#9bae74;      /* LCD darker tint */
    --ink:#1f2a14;        /* LCD "pixels"    */
    --body-0:#262b31;
    --body-1:#12151a;
    --key-0:#2d333c;
    --key-1:#161a20;
    --cap:#e7ecd6;        /* key glyph color */
    --brand:#c4cbd3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; -webkit-text-size-adjust:100%;}
  html{background:#0a0c0e;}
  body{
    position:fixed; inset:0; overflow:hidden;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Courier New",monospace;
    color:var(--brand);
    background:radial-gradient(130% 120% at 50% 0%, #1a1e24 0%, #0a0c0e 70%);
    overscroll-behavior:none; touch-action:none;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  #app{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:calc(env(safe-area-inset-top) + 8px) calc(env(safe-area-inset-right) + 8px)
            calc(env(safe-area-inset-bottom) + 8px) calc(env(safe-area-inset-left) + 8px);
  }
  /* ---- the "phone" ---- */
  #device{
    width:100%; max-width:430px; height:100%; max-height:860px;
    display:flex; flex-direction:column; gap:10px;
    padding:16px 16px 20px;
    background:linear-gradient(165deg,var(--body-0),var(--body-1));
    border-radius:30px;
    box-shadow:0 18px 50px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.07),
               inset 0 -2px 6px rgba(0,0,0,.5);
  }
  #brand{
    flex:0 0 auto; text-align:center; letter-spacing:5px; font-weight:700;
    font-size:14px; color:var(--brand); text-shadow:0 1px 0 rgba(0,0,0,.6);
    padding-top:2px;
  }
  #brand small{display:block; letter-spacing:3px; font-size:9px; opacity:.5; font-weight:600;}
  /* ---- LCD screen ---- */
  #screen{
    position:relative; flex:1 1 auto; min-height:0;
    display:flex; align-items:center; justify-content:center;
    padding:10px;
    background:linear-gradient(180deg,var(--lcd),var(--lcd-2));
    border-radius:10px;
    box-shadow:inset 0 0 0 2px #11140d, inset 0 2px 10px rgba(0,0,0,.35),
               0 1px 0 rgba(255,255,255,.05);
  }
  /* faint LCD scanlines */
  #screen::after{
    content:""; position:absolute; inset:10px; border-radius:4px; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply; opacity:.5;
  }
  canvas#game{display:block; image-rendering:pixelated; image-rendering:crisp-edges;}
  /* ---- LCD overlays (start / pause / over) ---- */
  #overlay{
    position:absolute; inset:10px; border-radius:4px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:18px;
    color:var(--ink); background:var(--lcd);
    text-transform:uppercase; letter-spacing:2px;
  }
  #overlay.hidden{display:none;}
  #ovTitle{font-size:26px; font-weight:800; margin:0; line-height:1.1;}
  #ovText{font-size:12px; line-height:1.6; margin:0; max-width:240px;}
  #ovText b{font-weight:800;}
  #ovHint{font-size:12px; font-weight:800; letter-spacing:3px; animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .lcd-btn{
    appearance:none; -webkit-appearance:none; cursor:pointer;
    font-family:inherit; text-transform:uppercase; letter-spacing:3px; font-weight:800;
    font-size:15px; padding:10px 26px; color:var(--lcd); background:var(--ink);
    border:2px solid var(--ink); border-radius:4px;
  }
  .lcd-btn:active{background:transparent; color:var(--ink);}
  /* ---- on-screen pause button (floats over the LCD, not part of the D-pad) ---- */
  #pauseBtn{
    position:absolute; top:6px; right:6px; z-index:6;
    display:none; align-items:center; justify-content:center; gap:4px;
    width:30px; height:30px; padding:0;
    background:rgba(31,42,20,.10); border:1.5px solid rgba(31,42,20,.55);
    border-radius:7px; cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  #pauseBtn.show{display:flex;}
  #pauseBtn i{width:5px; height:15px; background:var(--ink); border-radius:1px;}
  #pauseBtn:active{background:var(--ink);}
  #pauseBtn:active i{background:var(--lcd);}
  /* hit area extends past the artwork — miss above/below and still "hit" */
  #pauseBtn::after{content:""; position:absolute; inset:-16px -14px;}

  /* ---- D-pad ---- */
  #pad{
    position:relative; flex:0 0 auto; align-self:center;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    gap:0; width:min(64vw,220px); aspect-ratio:1/1; max-height:36vh;
    filter:drop-shadow(0 4px 5px rgba(0,0,0,.5));
  }
  .key{
    position:relative; appearance:none; border:none; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center;
    color:var(--cap); font-size:25px; line-height:1; font-weight:700;
    background:linear-gradient(180deg,var(--key-0),var(--key-1));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  }
  .key:active{filter:brightness(.82); box-shadow:inset 0 2px 7px rgba(0,0,0,.5);}
  /* cross arms — rounded only on the outer corners, arrow tucked toward the centre */
  #k-up   {grid-area:1/2/2/3; border-radius:15px 15px 0 0; align-items:flex-end;  padding-bottom:7px;}
  #k-down {grid-area:3/2/4/3; border-radius:0 0 15px 15px; align-items:flex-start; padding-top:7px;}
  #k-left {grid-area:2/1/3/2; border-radius:15px 0 0 15px; justify-content:flex-end;   padding-right:7px;}
  #k-right{grid-area:2/3/3/4; border-radius:0 15px 15px 0; justify-content:flex-start; padding-left:7px;}
  /* centre hub */
  #k-ok{
    grid-area:2/2/3/3; z-index:2; margin:5px; border-radius:50%;
    font-size:13px; letter-spacing:1px;
    background:linear-gradient(180deg,#39404a,#1b1f26);
    box-shadow:0 2px 0 #0c0e12, inset 0 1px 0 rgba(255,255,255,.12), 0 0 0 3px rgba(0,0,0,.22);
  }
  #k-ok:active{filter:none; box-shadow:inset 0 2px 6px rgba(0,0,0,.55);}
  /* extended hit areas — forgiving toward the empty corners / outward, never the hub */
  .key::after{content:""; position:absolute;}
  #k-up::after   {inset:-16px -8px 0 -8px;}
  #k-down::after {inset:0 -8px -16px -8px;}
  #k-left::after {inset:-8px 0 -8px -16px;}
  #k-right::after{inset:-8px -16px -8px 0;}
  #k-ok::after   {inset:-5px;}
  #hint{flex:0 0 auto; text-align:center; font-size:10px; letter-spacing:2px; color:#5b636e;}
  @media (max-height:620px){ #brand small{display:none;} #hint{display:none;} }
  @media (max-height:540px){ #brand{display:none;} }
</style>
</head>
<body>
  <div id="app">
    <div id="device">
      <div id="brand">NOKIA<small>SNAKE</small></div>
      <div id="screen">
        <canvas id="game"></canvas>
        <button id="pauseBtn" type="button" aria-label="Pause"><i></i><i></i></button>
        <div id="overlay">
          <h1 id="ovTitle">SNAKE</h1>
          <p id="ovText">Eat the dots. Don't hit the walls or yourself.</p>
          <button id="playBtn" class="lcd-btn">Start</button>
          <div id="ovHint">PRESS START</div>
        </div>
      </div>
      <div id="pad">
        <button id="k-up"    class="key" aria-label="Up">▼</button>
        <button id="k-left"  class="key" aria-label="Left">▶</button>
        <button id="k-ok"    class="key" aria-label="Start">OK</button>
        <button id="k-right" class="key" aria-label="Right">◀</button>
        <button id="k-down"  class="key" aria-label="Down">▲</button>
      </div>
      <div id="hint">SWIPE OR ARROWS · ❚❚ PAUSES</div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var GRID = 16, START_LEN = 3,
      BASE_SPEED = 130, MIN_SPEED = 70, SPEED_STEP = 4, MIN_STEP = 55,
      STATUS_ROWS = 1.7, SWIPE = 20;

  var canvas = document.getElementById('game'),
      ctx = canvas.getContext('2d'),
      screenEl = document.getElementById('screen'),
      overlay = document.getElementById('overlay'),
      ovTitle = document.getElementById('ovTitle'),
      ovText = document.getElementById('ovText'),
      ovHint = document.getElementById('ovHint'),
      playBtn = document.getElementById('playBtn'),
      pauseBtn = document.getElementById('pauseBtn');

  var cell = 16, statusH = 24, fieldX = 0, fieldY = 0,
      snake, dir, queue, food, score = 0, best = 0, speed = BASE_SPEED,
      state = 'start', lastStep = 0;

  try { best = parseInt(localStorage.getItem('snakeBest') || '0', 10) || 0; } catch(e){ best = 0; }

  // 5x7 pixel font for the LCD score read-out
  var FONT = {
    '0':[0x0E,0x11,0x13,0x15,0x19,0x11,0x0E],'1':[0x04,0x0C,0x04,0x04,0x04,0x04,0x0E],
    '2':[0x0E,0x11,0x01,0x02,0x04,0x08,0x1F],'3':[0x1F,0x02,0x04,0x02,0x01,0x11,0x0E],
    '4':[0x02,0x06,0x0A,0x12,0x1F,0x02,0x02],'5':[0x1F,0x10,0x1E,0x01,0x01,0x11,0x0E],
    '6':[0x06,0x08,0x10,0x1E,0x11,0x11,0x0E],'7':[0x1F,0x01,0x02,0x04,0x08,0x08,0x08],
    '8':[0x0E,0x11,0x11,0x0E,0x11,0x11,0x0E],'9':[0x0E,0x11,0x11,0x0F,0x01,0x02,0x0C],
    'H':[0x11,0x11,0x11,0x1F,0x11,0x11,0x11],'I':[0x0E,0x04,0x04,0x04,0x04,0x04,0x0E]
  };

  // ---------- sizing ----------
  function resize(){
    var pad = 10, rect = screenEl.getBoundingClientRect();
    var availW = rect.width - pad * 2, availH = rect.height - pad * 2;
    cell = Math.max(6, Math.floor(Math.min(availW / GRID, availH / (GRID + STATUS_ROWS))));
    statusH = Math.round(cell * STATUS_ROWS);
    var cssW = cell * GRID, cssH = cell * GRID + statusH;
    fieldX = 0; fieldY = statusH;
    var dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.style.width = cssW + 'px'; canvas.style.height = cssH + 'px';
    canvas.width = Math.round(cssW * dpr); canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    draw();
  }

  // ---------- game ----------
  function reset(){
    snake = [];
    var c = Math.floor(GRID / 2);
    for (var i = 0; i < START_LEN; i++) snake.push({ x: c - i, y: c });
    dir = { x: 1, y: 0 }; queue = [];
    score = 0; speed = BASE_SPEED;
    placeFood();
  }
  function placeFood(){
    if (snake.length >= GRID * GRID) { win(); return; }
    var occ = {}, p, k;
    for (var i = 0; i < snake.length; i++) occ[snake[i].x + ',' + snake[i].y] = 1;
    do { p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 }; k = p.x + ',' + p.y; }
    while (occ[k]);
    food = p;
  }
  function setDir(nx, ny){
    if (state !== 'playing') return;
    var ref = queue.length ? queue[queue.length - 1] : dir;
    if (ref.x === -nx && ref.y === -ny) return;   // no reversal
    if (ref.x === nx && ref.y === ny) return;      // no duplicate
    if (queue.length < 2) queue.push({ x: nx, y: ny });
    // eager turn: apply at once if a tick's worth of time has passed
    if (performance.now() - lastStep >= MIN_STEP) { lastStep = performance.now(); step(); }
  }
  function step(){
    if (queue.length) dir = queue.shift();
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) return gameOver();
    var ate = (head.x === food.x && head.y === food.y);
    var limit = ate ? snake.length : snake.length - 1;
    for (var i = 0; i < limit; i++) if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
    snake.unshift(head);
    if (ate){
      score++;
      if (score > best){ best = score; try { localStorage.setItem('snakeBest', best); } catch(e){} }
      speed = Math.max(MIN_SPEED, BASE_SPEED - score * SPEED_STEP);
      placeFood();
    } else snake.pop();
  }

  // ---------- drawing ----------
  function px(n){ return Math.round(n); }
  function glyph(g, x, y, s){
    if (!g) return;
    for (var r = 0; r < 7; r++) for (var c = 0; c < 5; c++)
      if (g[r] & (1 << (4 - c))) ctx.fillRect(px(x + c * s), px(y + r * s), s, s);
  }
  function text(str, x, y, s, alignRight){
    var w = str.length * 6 * s - s;
    if (alignRight) x -= w;
    for (var i = 0; i < str.length; i++){ glyph(FONT[str[i]], x, y, s); x += 6 * s; }
    return w;
  }
  function draw(ts){
    ts = ts || performance.now();
    var W = cell * GRID, H = cell * GRID + statusH;
    ctx.fillStyle = '#a8ba84'; ctx.fillRect(0, 0, W, H);   // LCD wash
    ctx.fillStyle = '#1f2a14';

    // ----- status bar (pixel-font score) -----
    var fs = Math.max(1, Math.floor(statusH / 9));          // font pixel size
    var fy = Math.round((statusH - 7 * fs) / 2);
    text(String(score), 2 * fs, fy, fs, false);
    var hi = 'HI' + String(best);
    text(hi, W - 2 * fs, fy, fs, true);
    ctx.fillRect(0, statusH - 1, W, 1);                     // divider

    if (!snake) return;

    // ----- play field border -----
    ctx.fillRect(fieldX, fieldY, W, 1);
    ctx.fillRect(fieldX, H - 1, W, 1);
    ctx.fillRect(fieldX, fieldY, 1, H - fieldY);
    ctx.fillRect(W - 1, fieldY, 1, H - fieldY);

    var inset = cell <= 8 ? 1 : 2;
    // ----- food (blinks, like the original) -----
    if ((ts % 600) < 420){
      var fx = fieldX + food.x * cell, fyy = fieldY + food.y * cell;
      ctx.fillRect(px(fx + inset), px(fyy + inset), cell - inset * 2, cell - inset * 2);
    }
    // ----- snake (solid LCD blocks) -----
    for (var i = 0; i < snake.length; i++){
      var sx = fieldX + snake[i].x * cell, sy = fieldY + snake[i].y * cell;
      ctx.fillRect(px(sx), px(sy), cell - 1, cell - 1);
      if (i === 0 && cell >= 9){                            // head: hollow center to "lead"
        ctx.fillStyle = '#a8ba84';
        ctx.fillRect(px(sx + (cell - 1) / 2 - 1), px(sy + (cell - 1) / 2 - 1), 2, 2);
        ctx.fillStyle = '#1f2a14';
      }
    }
  }

  // ---------- loop ----------
  function loop(ts){
    requestAnimationFrame(loop);
    if (state === 'playing'){
      if (!lastStep) lastStep = ts;
      if (ts - lastStep >= speed){ lastStep = ts; step(); }
    }
    draw(ts);
  }

  // ---------- state ----------
  function showOverlay(title, html, btn, hint){
    ovTitle.textContent = title; ovText.innerHTML = html;
    playBtn.textContent = btn; ovHint.textContent = hint || '';
    ovHint.style.display = hint ? '' : 'none';
    overlay.classList.remove('hidden');
    pauseBtn.classList.remove('show');
  }
  function startGame(){ reset(); state = 'playing'; lastStep = 0; overlay.classList.add('hidden'); pauseBtn.classList.add('show'); }
  function gameOver(){
    state = 'over';
    showOverlay('GAME OVER', 'Score <b>' + score + '</b> · Best <b>' + best + '</b>', 'Play Again', 'TAP TO RETRY');
  }
  function win(){ state = 'over'; showOverlay('YOU WIN', 'Perfect board — <b>' + score + '</b>', 'Play Again', 'TAP TO RETRY'); }
  function togglePause(){
    if (state === 'playing'){ state = 'paused'; showOverlay('PAUSED', 'Take a breather.', 'Resume', 'TAP TO RESUME'); }
    else if (state === 'paused'){ state = 'playing'; lastStep = 0; overlay.classList.add('hidden'); pauseBtn.classList.add('show'); }
  }
  function activate(){ if (state === 'paused') togglePause(); else startGame(); }

  // ---------- input ----------
  function press(el, fn){
    el.addEventListener('pointerdown', function(e){ e.preventDefault(); fn(); }, { passive: false });
  }
  press(overlay, function(){ if (!overlay.classList.contains('hidden')) activate(); });
  press(pauseBtn, function(){ if (state === 'playing') togglePause(); });
  press(document.getElementById('k-ok'), function(){ if (state !== 'playing') activate(); });
  function dpad(id, x, y){
    press(document.getElementById(id), function(){ if (state === 'playing') setDir(x, y); else activate(); });
  }
  dpad('k-up', 0, -1); dpad('k-down', 0, 1); dpad('k-left', -1, 0); dpad('k-right', 1, 0);

  window.addEventListener('keydown', function(e){
    var k = e.key;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') setDir(0, -1);
    else if (k === 'ArrowDown' || k === 's' || k === 'S') setDir(0, 1);
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') setDir(-1, 0);
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') setDir(1, 0);
    else if (k === ' ' || k === 'Enter'){ if (state === 'playing' || state === 'paused') togglePause(); else startGame(); e.preventDefault(); return; }
    else return;
    if (state === 'start' || state === 'over') startGame();
    e.preventDefault();
  }, { passive: false });

  // swipe on the screen to steer (pause is the on-screen ❚❚ button / Space —
  // launching the game can't accidentally pause it on the same gesture)
  var sx0 = 0, sy0 = 0;
  screenEl.addEventListener('touchstart', function(e){
    var t = e.changedTouches[0]; sx0 = t.clientX; sy0 = t.clientY;
  }, { passive: true });
  screenEl.addEventListener('touchmove', function(e){
    e.preventDefault();
    if (state !== 'playing') return;
    var t = e.changedTouches[0], dx = t.clientX - sx0, dy = t.clientY - sy0;
    if (Math.abs(dx) < SWIPE && Math.abs(dy) < SWIPE) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0); else setDir(0, dy > 0 ? 1 : -1);
    sx0 = t.clientX; sy0 = t.clientY;
  }, { passive: false });

  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });

  // ---------- init ----------
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 150); });
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

  resize();
  showOverlay('SNAKE', 'Eat the dots.<br>Don\'t hit the walls or yourself.', 'Start', 'PRESS START');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
