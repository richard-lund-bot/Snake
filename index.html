<style>
  :root{
    --bg0:#0f172a; --bg1:#020617;
    --emerald:#34d399; --emerald2:#10b981;
    --board:#0b1220; --text:#e2e8f0; --muted:#64748b; --red:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; -webkit-text-size-adjust:100%;}
  html{background:#020617;}
  body{
    position:fixed; inset:0; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:radial-gradient(125% 125% at 50% 0%, #0f172a 0%, #020617 60%);
    overscroll-behavior:none; touch-action:none;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  #app{
    position:absolute; inset:0; display:flex; flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 6px) calc(env(safe-area-inset-right) + 12px)
            calc(env(safe-area-inset-bottom) + 6px) calc(env(safe-area-inset-left) + 12px);
  }
  #hud{display:flex; align-items:center; gap:10px; padding:4px 2px 10px;}
  .brand{font-weight:700; font-size:18px; letter-spacing:.5px; flex:0 0 auto;}
  .scores{display:flex; gap:8px; margin-left:auto;}
  .score{
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    border-radius:12px; padding:6px 12px; min-width:62px; text-align:center;
    display:flex; flex-direction:column; line-height:1.15;
  }
  .score .label{font-size:9px; color:var(--muted); letter-spacing:1.5px;}
  .score .val{font-size:18px; font-weight:700; font-variant-numeric:tabular-nums;}
  .icon-btn{
    flex:0 0 auto; width:40px; height:40px; border-radius:12px;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    color:var(--text); font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:active{transform:scale(.94);}
  #stage{flex:1 1 auto; position:relative; display:flex; align-items:center; justify-content:center; min-height:0;}
  #board{
    position:relative; width:var(--size,300px); height:var(--size,300px);
    border-radius:18px; background:var(--board); overflow:hidden; touch-action:none;
    box-shadow:0 12px 44px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.06);
  }
  canvas#game{display:block; width:100%; height:100%;}
  .overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:22px; background:rgba(2,6,23,.78);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    transition:opacity .2s ease;
  }
  .overlay.hidden{opacity:0; pointer-events:none;}
  .panel h1{margin:0 0 10px; font-size:34px; letter-spacing:1px;}
  .panel p{margin:0 0 22px; color:#cbd5e1; font-size:15px; line-height:1.55;}
  .btn{
    appearance:none; -webkit-appearance:none; border:none; cursor:pointer;
    background:linear-gradient(180deg,var(--emerald),var(--emerald2));
    color:#03261b; font-weight:800; font-size:17px; letter-spacing:.5px;
    padding:14px 40px; border-radius:14px; box-shadow:0 8px 24px rgba(16,185,129,.35);
  }
  .btn:active{transform:translateY(1px) scale(.99);}
  #foot{text-align:center; color:var(--muted); font-size:11px; padding:8px 0 2px;}
  @media (max-height:560px){ .brand{display:none;} #foot{display:none;} }
</style>
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="brand">🐍 Snake</div>
      <div class="scores">
        <div class="score"><span class="label">SCORE</span><span class="val" id="score">0</span></div>
        <div class="score"><span class="label">BEST</span><span class="val" id="best">0</span></div>
      </div>
      <button id="pauseBtn" class="icon-btn" aria-label="Pause">❚❚</button>
    </header>
    <main id="stage">
      <div id="board">
        <canvas id="game"></canvas>
        <div id="overlay" class="overlay">
          <div class="panel">
            <h1 id="ovTitle">Snake</h1>
            <p id="ovText">Swipe to move • eat the apples<br>Don't hit the walls or yourself.</p>
            <button id="playBtn" class="btn">Play</button>
          </div>
        </div>
      </div>
    </main>
    <footer id="foot">Swipe to steer • arrow keys on desktop • tap board to pause</footer>
  </div>

<script>
(function(){
  "use strict";
  var GRID = 19, START_LEN = 3, BASE_SPEED = 150, MIN_SPEED = 70, SPEED_STEP = 4, SWIPE = 22;

  var canvas = document.getElementById('game'),
      ctx = canvas.getContext('2d'),
      board = document.getElementById('board'),
      stage = document.getElementById('stage'),
      scoreEl = document.getElementById('score'),
      bestEl = document.getElementById('best'),
      overlay = document.getElementById('overlay'),
      ovTitle = document.getElementById('ovTitle'),
      ovText = document.getElementById('ovText'),
      pauseBtn = document.getElementById('pauseBtn');

  var cell = 16, snake, dir, queue, food, score = 0, best = 0, speed = BASE_SPEED,
      state = 'start', lastStep = 0;

  try { best = parseInt(localStorage.getItem('snakeBest') || '0', 10) || 0; } catch(e){ best = 0; }
  bestEl.textContent = best;

  // ---------- sizing ----------
  function resize(){
    var rect = stage.getBoundingClientRect();
    var size = Math.max(120, Math.floor(Math.min(rect.width, rect.height)));
    board.style.setProperty('--size', size + 'px');
    var dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = Math.round(size * dpr);
    canvas.height = Math.round(size * dpr);
    cell = canvas.width / GRID;
    draw();
  }

  // ---------- game state ----------
  function reset(){
    snake = [];
    var c = Math.floor(GRID / 2);
    for (var i = 0; i < START_LEN; i++) snake.push({ x: c - i, y: c });
    dir = { x: 1, y: 0 };
    queue = [];
    score = 0; speed = BASE_SPEED;
    scoreEl.textContent = score;
    placeFood();
  }

  function placeFood(){
    var occ = {}, k;
    for (var i = 0; i < snake.length; i++) occ[snake[i].x + ',' + snake[i].y] = 1;
    if (snake.length >= GRID * GRID) { win(); return; }
    var p;
    do { p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 }; k = p.x + ',' + p.y; }
    while (occ[k]);
    food = p;
  }

  function setDir(nx, ny){
    var ref = queue.length ? queue[queue.length - 1] : dir;
    if (ref.x === -nx && ref.y === -ny) return; // no 180-degree reversal
    if (ref.x === nx && ref.y === ny) return;   // no duplicate
    if (queue.length < 2) queue.push({ x: nx, y: ny });
  }

  function step(){
    if (queue.length) dir = queue.shift();
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) return gameOver();
    var ate = (head.x === food.x && head.y === food.y);
    var limit = ate ? snake.length : snake.length - 1; // tail vacates unless eating
    for (var i = 0; i < limit; i++) if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
    snake.unshift(head);
    if (ate){
      score++; scoreEl.textContent = score;
      if (score > best){ best = score; bestEl.textContent = best; try { localStorage.setItem('snakeBest', best); } catch(e){} }
      speed = Math.max(MIN_SPEED, BASE_SPEED - score * SPEED_STEP);
      placeFood();
    } else {
      snake.pop();
    }
  }

  // ---------- drawing ----------
  function roundRect(x, y, w, h, r){
    if (r > w / 2) r = w / 2; if (r > h / 2) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function rectFor(c){
    var gap = Math.max(1, cell * 0.08);
    return [c.x * cell + gap / 2, c.y * cell + gap / 2, cell - gap, cell - gap];
  }

  function draw(){
    var W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0b1220'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.035)'; ctx.lineWidth = 1;
    for (var i = 1; i < GRID; i++){
      ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(W, i * cell); ctx.stroke();
    }
    if (!snake) return;

    // food
    var f = rectFor(food), fr = Math.min(f[2], f[3]) / 2;
    ctx.save();
    ctx.shadowColor = 'rgba(239,68,68,.6)'; ctx.shadowBlur = cell * 0.4;
    ctx.fillStyle = '#ef4444';
    roundRect(f[0], f[1], f[2], f[3], fr); ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.beginPath(); ctx.arc(f[0] + f[2] * 0.33, f[1] + f[3] * 0.3, Math.max(1, cell * 0.09), 0, Math.PI * 2); ctx.fill();

    // snake (tail first so head draws on top)
    var n = snake.length;
    for (var s = n - 1; s >= 0; s--){
      var seg = snake[s], r = rectFor(seg), t = n > 1 ? s / (n - 1) : 0;
      if (s === 0){ ctx.fillStyle = '#34d399'; }
      else {
        var g = Math.round(120 + (1 - t) * 20);
        ctx.fillStyle = 'rgb(' + Math.round(16 + (1 - t) * 24) + ',' + Math.round(170 + (1 - t) * 30) + ',' + g + ')';
      }
      roundRect(r[0], r[1], r[2], r[3], Math.max(2, cell * 0.22)); ctx.fill();
    }
    drawEyes();
  }

  function drawEyes(){
    var r = rectFor(snake[0]), x = r[0], y = r[1], w = r[2], h = r[3];
    var rad = Math.max(1.5, cell * 0.11), F = 0.3, B = 0.7, e1x, e1y, e2x, e2y;
    if (dir.x === 1){ e1x = e2x = x + w * B; e1y = y + h * F; e2y = y + h * B; }
    else if (dir.x === -1){ e1x = e2x = x + w * F; e1y = y + h * F; e2y = y + h * B; }
    else if (dir.y === -1){ e1y = e2y = y + h * F; e1x = x + w * F; e2x = x + w * B; }
    else { e1y = e2y = y + h * B; e1x = x + w * F; e2x = x + w * B; }
    ctx.fillStyle = '#06281d';
    ctx.beginPath(); ctx.arc(e1x, e1y, rad, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e2x, e2y, rad, 0, Math.PI * 2); ctx.fill();
  }

  // ---------- loop ----------
  function loop(ts){
    requestAnimationFrame(loop);
    if (state !== 'playing') return;
    if (!lastStep) lastStep = ts;
    if (ts - lastStep >= speed){ lastStep = ts; step(); if (state === 'playing') draw(); }
  }

  // ---------- overlays / transitions ----------
  function showOverlay(title, html, btn){
    ovTitle.textContent = title; ovText.innerHTML = html;
    document.getElementById('playBtn').textContent = btn;
    overlay.classList.remove('hidden');
  }
  function startGame(){
    reset(); state = 'playing'; lastStep = 0;
    overlay.classList.add('hidden'); pauseBtn.textContent = '❚❚'; draw();
  }
  function gameOver(){
    state = 'over';
    showOverlay('Game Over', 'Score <b>' + score + '</b> &nbsp;•&nbsp; Best <b>' + best + '</b>', 'Play Again');
  }
  function win(){
    state = 'over';
    showOverlay('You Win! 🎉', 'A perfect board — score <b>' + score + '</b>', 'Play Again');
  }
  function togglePause(){
    if (state === 'playing'){ state = 'paused'; pauseBtn.textContent = '▶'; showOverlay('Paused', 'Tap Resume to continue.', 'Resume'); }
    else if (state === 'paused'){ state = 'playing'; lastStep = 0; pauseBtn.textContent = '❚❚'; overlay.classList.add('hidden'); }
  }
  function activate(){ if (state === 'paused') togglePause(); else startGame(); }

  // ---------- input ----------
  overlay.addEventListener('click', function(e){ e.preventDefault(); if (!overlay.classList.contains('hidden')) activate(); });
  pauseBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); if (state === 'playing' || state === 'paused') togglePause(); });

  window.addEventListener('keydown', function(e){
    var k = e.key;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') setDir(0, -1);
    else if (k === 'ArrowDown' || k === 's' || k === 'S') setDir(0, 1);
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') setDir(-1, 0);
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') setDir(1, 0);
    else if (k === ' ' || k === 'Enter'){ if (state === 'playing' || state === 'paused') togglePause(); else startGame(); e.preventDefault(); return; }
    else return;
    if (state === 'start' || state === 'over') startGame();
    e.preventDefault();
  }, { passive: false });

  var sx = 0, sy = 0, moved = false, st = 0;
  board.addEventListener('touchstart', function(e){
    var t = e.changedTouches[0]; sx = t.clientX; sy = t.clientY; moved = false; st = Date.now();
  }, { passive: true });
  board.addEventListener('touchmove', function(e){
    e.preventDefault();
    if (state !== 'playing') return;
    var t = e.changedTouches[0], dx = t.clientX - sx, dy = t.clientY - sy;
    if (Math.abs(dx) < SWIPE && Math.abs(dy) < SWIPE) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0); else setDir(0, dy > 0 ? 1 : -1);
    sx = t.clientX; sy = t.clientY; moved = true;
  }, { passive: false });
  board.addEventListener('touchend', function(e){
    if (!moved && Date.now() - st < 300 && state === 'playing') togglePause();
  }, { passive: true });

  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('dblclick', function(e){ e.preventDefault(); });

  // ---------- init ----------
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 150); });
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

  resize();
  showOverlay('Snake', 'Swipe to move • eat the apples<br>Don\'t hit the walls or yourself.', 'Play');
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
